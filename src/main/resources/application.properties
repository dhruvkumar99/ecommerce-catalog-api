# ==================== SERVER CONFIGURATION ====================
server.port=8080

# ==================== MYSQL DATABASE CONFIGURATION ====================
# MySQL connection with your password "chill"
spring.datasource.url=jdbc:mysql://localhost:3306/ecomdb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=chill
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==================== JPA CONFIGURATION ====================
# Hibernate will create/update tables automatically
spring.jpa.hibernate.ddl-auto=update

# Show SQL queries in console (helpful for debugging)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Use MySQL8 dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ==================== H2 CONSOLE (DISABLED FOR MYSQL) ====================
spring.h2.console.enabled=false

# ==================== LOGGING (OPTIONAL) ====================
# Show more detailed logs
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=INFO